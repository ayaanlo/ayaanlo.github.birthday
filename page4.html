<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mom ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff6f91, #ffb6c1, #ffc0cb);
    color: white;
}

.message {
    max-width: 600px;
    animation: fadeIn 3s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<div class="message">
    <h1>Happy Birthday Mom ❤️</h1>
    <p>
        Everything I am today is because of you.  
        Your love, your strength, and your sacrifices made me who I am.  
        <br><br>
        You are my guide, my strength, and my home.  
        <br><br>
        I love you so much 💖
    </p>
</div>

</body>
</html>
