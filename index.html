<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Mom 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff6f91, #ffb6c1, #ffc0cb);
    text-align: center;
    color: white;
}

.container {
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 40px;
    text-shadow: 0 0 10px rgba(255,105,180,0.8);
}

p {
    font-size: 20px;
    margin-bottom: 30px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: #ff69b4;
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

.bike {
    position: fixed;
    bottom: 20px;
    left: -100px;
    font-size: 40px;
    animation: ride 8s linear infinite;
}

@keyframes ride {
    0% { left: -100px; }
    100% { left: 110%; }
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>Dear Mom 💖</h1>
    <p>I made something for you...</p>
    <button onclick="nextPage()">Click here 💖</button>
</div>

<div class="bike">🏍️</div>

<script>
document.body.addEventListener("click", function () {
    document.getElementById("bgMusic").play();
}, { once: true });

function nextPage() {
    window.location.href = "page2.html";
}
</script>

</body>
</html>
