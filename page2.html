<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎉</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff6f91, #ffb6c1, #ffc0cb);
    color: white;
    text-align: center;
}

h1 {
    font-size: 50px;
    text-shadow: 0 0 10px rgba(255,105,180,0.8);
}

p {
    font-size: 22px;
}

button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: #ff69b4;
    color: white;
    cursor: pointer;
}

.bike {
    position: fixed;
    bottom: 20px;
    left: -100px;
    font-size: 40px;
    animation: ride 8s linear infinite;
}

@keyframes ride {
    0% { left: -100px; }
    100% { left: 110%; }
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday Mom! 🎉</h1>
<p>You are the most precious gem of my life 💖</p>
<p>It’s not over yet… 👀</p>

<button onclick="nextPage()">There's more 👀</button>

<div class="bike">🏍️</div>

<script>
window.onload = () => {
    confetti({
        particleCount: 150,
        spread: 90,
        origin: { y: 0.6 }
    });
};

function nextPage() {
    window.location.href = "page3.html";
}
</script>

</body>
</html>
